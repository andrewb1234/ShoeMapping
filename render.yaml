# Render Blueprint — Personalization API + Worker + Postgres
# https://render.com/docs/blueprint-spec

services:
  # --- Personalization API (web) ---
  - type: web
    name: shoe-mapping-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements-personalization.txt
    startCommand: uvicorn api.personalization_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: shoe-mapping-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_BASE_URL
        fromService:
          type: web
          name: shoe-mapping-api
          property: host
      - key: PERSONALIZATION_BASE_URL
        fromService:
          type: web
          name: shoe-mapping-api
          property: host
      - key: PUBLIC_WEB_BASE_URL
        value: https://shoe-mapping.vercel.app
      - key: AUTO_CREATE_DB
        value: "false"
      - key: INLINE_JOB_EXECUTION
        value: "true"
      - key: ENABLE_STRAVA_UI
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.11"
    previews:
      generation: manual

  # --- Background Worker ---
  - type: worker
    name: shoe-mapping-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements-personalization.txt
    startCommand: python -m personalization.worker
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: shoe-mapping-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_WEB_BASE_URL
        value: https://shoe-mapping.vercel.app
      - key: AUTO_CREATE_DB
        value: "false"
      - key: INLINE_JOB_EXECUTION
        value: "false"
      - key: ENABLE_STRAVA_UI
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.11"
    previews:
      generation: manual

databases:
  - name: shoe-mapping-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
    previewPlan: free
